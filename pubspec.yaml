name: iphone_security_checker
description: فاحص أمان الآيفون - يكشف الاختراق والتجسس
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.3.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0

  # Device & Security
  device_info_plus: ^9.1.0
  package_info_plus: ^5.0.1
  battery_plus: ^5.0.2
  connectivity_plus: ^5.0.2
  network_info_plus: ^5.0.0

  # Permissions
  permission_handler: ^11.1.0

  # Storage & Reports
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  pdf: ^3.10.7
  printing: ^5.12.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/suspicious_domains.json
    - assets/data/spyware_list.json
    - assets/images/
