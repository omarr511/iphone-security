workflows:
  ios-workflow:
    name: iOS Release IPA (unsigned)
    max_build_duration: 30
    instance_type: mac_mini_m2
    
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      
      # ضع بيانات Apple Developer هنا بعد ربط الحساب
      # ios_signing:
      #   distribution_type: ad_hoc
      #   bundle_identifier: com.yourname.iphoneSecurity

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS Release (unsigned .app)
        script: |
          set -e
          flutter build ios --release --no-codesign
          echo "--- Build output ---"
          ls -la build/ios/iphoneos/ || true

      - name: Package .app into .ipa
        script: |
          set -e
          APP_PATH="build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found at $APP_PATH"
            find build/ios -name "*.app" -type d 2>/dev/null || true
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r -9 iphone_security_checker_unsigned.ipa Payload
          rm -rf Payload
          echo "--- IPA created ---"
          ls -la iphone_security_checker_unsigned.ipa

    artifacts:
      - iphone_security_checker_unsigned.ipa

    publishing:
      email:
        recipients:
          - ulvhgujdfd14@gmail.com
        notify:
          success: true
          failure: true
