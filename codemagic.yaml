workflows:
  ios-workflow:
    name: iOS Release IPA (unsigned)
    max_build_duration: 30
    instance_type: mac_mini_m2
    
    environment:
      flutter: 3.19.0
      xcode: latest
      cocoapods: default
      
      # ضع بيانات Apple Developer هنا بعد ربط الحساب
      # ios_signing:
      #   distribution_type: ad_hoc
      #   bundle_identifier: com.yourname.iphoneSecurity

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS IPA (unsigned, sideload-ready)
        script: |
          flutter build ipa --release --no-codesign

      - name: Normalize IPA artifact name
        script: |
          ls -la build/ios/ipa
          cp build/ios/ipa/*.ipa iphone_security_checker_unsigned.ipa

    artifacts:
      - iphone_security_checker_unsigned.ipa
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - ulvhgujdfd14@gmail.com
        notify:
          success: true
          failure: true
