workflows:
  ios-workflow:
    name: iOS Security Checker Build
    max_build_duration: 30
    instance_type: mac_mini_m2
    
    environment:
      flutter: 3.19.0
      xcode: latest
      cocoapods: default
      
      # ضع بيانات Apple Developer هنا بعد ربط الحساب
      # ios_signing:
      #   distribution_type: ad_hoc
      #   bundle_identifier: com.yourname.iphoneSecurity

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update

      - name: Build iOS IPA (no code signing — for sideload)
        script: |
          flutter build ios --release --no-codesign
          
          # Package manually
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r iPhoneSecurityChecker.ipa Payload
          rm -rf Payload

    artifacts:
      - iPhoneSecurityChecker.ipa
      - build/ios/iphoneos/**/*.app

    publishing:
      email:
        recipients:
          - your-email@gmail.com   # ← غيّر هذا
        notify:
          success: true
          failure: true
